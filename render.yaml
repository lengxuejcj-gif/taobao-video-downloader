services:
  - type: web
    name: taobao-video-downloader
    env: docker
    healthCheckPath: /health
    disk:
      name: taobao-video-storage
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: STORAGE_ROOT
        value: /data/taobao-videos
      - key: ALLOW_CUSTOM_SAVE_DIR
        value: false
      - key: APP_PASSWORD
        sync: false
